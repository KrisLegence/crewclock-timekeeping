<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CrewClock — Timekeeping System</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue-600:#2563eb;--blue-700:#1d4ed8;--green-600:#16a34a;--green-700:#15803d;--red-500:#ef4444;--amber-500:#f59e0b;--gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;--gray-300:#d1d5db;--gray-500:#6b7280;--gray-700:#374151;--gray-900:#111827;--radius:8px;--shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);--shadow-lg:0 10px 15px -3px rgba(0,0,0,.1),0 4px 6px rgba(0,0,0,.05)}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--gray-50);color:var(--gray-900);line-height:1.5}
.app{display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--gray-900);color:#fff;padding:24px 0;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
.sidebar .logo{padding:0 20px 24px;font-size:20px;font-weight:700;letter-spacing:-.5px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar .logo span{color:var(--blue-600)}
.sidebar nav{flex:1;padding:16px 0}
.sidebar a{display:flex;align-items:center;gap:10px;padding:10px 20px;color:var(--gray-300);text-decoration:none;font-size:14px;font-weight:500;transition:all .15s;cursor:pointer}
.sidebar a:hover,.sidebar a.active{background:rgba(255,255,255,.08);color:#fff}
.sidebar a.active{border-left:3px solid var(--blue-600)}
.main{flex:1;padding:32px;max-width:1200px;margin-left:240px}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.page-header h1{font-size:24px;font-weight:700}
.page-header .subtitle{color:var(--gray-500);font-size:14px;margin-top:2px}
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;margin-bottom:20px}
.card h2{font-size:16px;font-weight:600;margin-bottom:16px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;text-align:center}
.stat-card .value{font-size:32px;font-weight:700;color:var(--blue-600)}
.stat-card .label{font-size:13px;color:var(--gray-500);margin-top:4px}
input,select,textarea{width:100%;padding:8px 12px;border:1px solid var(--gray-300);border-radius:var(--radius);font-size:14px;font-family:inherit;transition:border-color .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue-600);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
label{display:block;font-size:13px;font-weight:600;margin-bottom:4px;color:var(--gray-700)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.form-group{margin-bottom:16px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit}
.btn-primary{background:var(--blue-600);color:#fff}.btn-primary:hover{background:var(--blue-700)}
.btn-success{background:var(--green-600);color:#fff}.btn-success:hover{background:var(--green-700)}
.btn-danger{background:var(--red-500);color:#fff}.btn-danger:hover{background:#dc2626}
.btn-outline{background:#fff;color:var(--gray-700);border:1px solid var(--gray-300)}.btn-outline:hover{background:var(--gray-50)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-lg{padding:14px 32px;font-size:16px}
.btn:disabled{opacity:.5;cursor:not-allowed}
table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:left;padding:10px 12px;background:var(--gray-50);border-bottom:2px solid var(--gray-200);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-500)}
td{padding:10px 12px;border-bottom:1px solid var(--gray-100)}
tr:hover td{background:var(--gray-50)}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:12px;font-weight:600}
.badge-pending{background:#fef3c7;color:#92400e}
.badge-approved{background:#d1fae5;color:#065f46}
.badge-flagged{background:#fee2e2;color:#991b1b}
.badge-clocked-in{background:#dbeafe;color:#1e40af}
.crew-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin:16px 0}
.crew-card{border:2px solid var(--gray-200);border-radius:var(--radius);padding:16px;text-align:center;cursor:pointer;transition:all .15s;user-select:none}
.crew-card:hover{border-color:var(--blue-600)}
.crew-card.selected{border-color:var(--blue-600);background:#eff6ff}
.crew-card .name{font-weight:600;font-size:15px}
.crew-card .emp-num{font-size:12px;color:var(--gray-500)}
.crew-card .checkmark{width:24px;height:24px;border-radius:50%;border:2px solid var(--gray-300);margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:14px}
.crew-card.selected .checkmark{background:var(--blue-600);border-color:var(--blue-600);color:#fff}
.clocked-in-card{border:2px solid var(--green-600);border-radius:var(--radius);padding:16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;background:#f0fdf4}
.clocked-in-card .emp-info .name{font-weight:600;font-size:15px}
.clocked-in-card .emp-info .detail{font-size:12px;color:var(--gray-500)}
.clocked-in-card .clock-time{font-family:monospace;font-size:14px;color:var(--green-700);font-weight:600}
.tab-bar{display:flex;gap:0;margin-bottom:24px;border-bottom:2px solid var(--gray-200)}
.tab{padding:12px 24px;font-size:14px;font-weight:600;cursor:pointer;color:var(--gray-500);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab:hover{color:var(--gray-700)}
.tab.active{color:var(--blue-600);border-bottom-color:var(--blue-600)}
.tab .count{background:var(--gray-200);color:var(--gray-700);padding:1px 8px;border-radius:10px;font-size:12px;margin-left:6px}
.tab.active .count{background:var(--blue-600);color:#fff}
.flag-card{border-left:4px solid var(--red-500);background:#fff;border-radius:0 var(--radius) var(--radius) 0;box-shadow:var(--shadow);padding:16px 20px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.flag-card .flag-type{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--red-500);font-weight:700}
.flag-card .flag-msg{font-size:14px;margin-top:4px}
.photo-upload{border:2px dashed var(--gray-300);border-radius:var(--radius);padding:32px;text-align:center;cursor:pointer;transition:all .15s}
.photo-upload:hover{border-color:var(--blue-600);background:#eff6ff}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;background:var(--green-600);color:#fff;border-radius:var(--radius);box-shadow:var(--shadow-lg);font-weight:600;font-size:14px;z-index:2000;animation:slideIn .3s ease}
@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@media(max-width:768px){.sidebar{width:60px}.sidebar .logo span,.sidebar a span{display:none}.main{margin-left:60px;padding:16px}.form-row{grid-template-columns:1fr}.crew-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}}
.hidden{display:none}
.pulse{animation:pulse 2s infinite}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1500;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease}
.modal{background:#fff;border-radius:12px;box-shadow:var(--shadow-lg);width:560px;max-width:90vw;max-height:90vh;overflow-y:auto;padding:0}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--gray-200);display:flex;justify-content:space-between;align-items:center}
.modal-header h2{font-size:18px;font-weight:700;margin:0}
.modal-header .close-btn{background:none;border:none;font-size:24px;cursor:pointer;color:var(--gray-500);padding:0 4px;line-height:1}
.modal-header .close-btn:hover{color:var(--gray-900)}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--gray-200);display:flex;justify-content:flex-end;gap:12px}
.read-only-field{padding:8px 12px;background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--radius);font-size:14px;color:var(--gray-700)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
  <div class="logo">Crew<span>Clock</span></div>
  <nav>
    <a data-page="dashboard" class="active" onclick="showPage('dashboard')"><span>Dashboard</span></a>
    <a data-page="huddle" onclick="showPage('huddle')"><span>Crew Huddle</span></a>
    <a data-page="entries" onclick="showPage('entries')"><span>Time Entries</span></a>
    <a data-page="manual" onclick="showPage('manual')"><span>Manual Entry</span></a>
    <a data-page="validation" onclick="showPage('validation')"><span>Review &amp; Fix</span></a>
    <a data-page="export" onclick="showPage('export')"><span>Sage 300 Export</span></a>
    <a data-page="audit" onclick="showPage('audit')"><span>Audit Trail</span></a>
  </nav>
  <div style="padding:0 20px;font-size:11px;color:rgba(255,255,255,.3)">v1.1 &middot; SOX Compliant</div>
</aside>
<main class="main" id="main-content"></main>
</div>

<div id="toast-container"></div>

<script>
const API='';
let currentPage='dashboard',huddleTab='punch-in',selectedCrew=new Set(),photoAttached=false;

function showToast(msg,isError){
  const c=document.getElementById('toast-container');
  c.innerHTML='<div class="toast" style="background:'+(isError?'var(--red-500)':'var(--green-600)')+'">'+msg+'</div>';
  setTimeout(function(){c.innerHTML='';},3000);
}

function showPage(page){
  currentPage=page;
  document.querySelectorAll('.sidebar a').forEach(function(a){a.classList.toggle('active',a.dataset.page===page);});
  var main=document.getElementById('main-content');
  switch(page){
    case 'dashboard':renderDashboard(main);break;
    case 'huddle':renderHuddle(main);break;
    case 'entries':renderEntries(main);break;
    case 'manual':renderManual(main);break;
    case 'validation':renderValidation(main);break;
    case 'export':renderExport(main);break;
    case 'audit':renderAudit(main);break;
  }
}

function api(path,opts){return fetch(API+path,opts).then(function(res){return res.json();});}

function fmtTime(iso){
  if(!iso)return '—';
  var d=new Date(iso);
  var h=d.getHours(),m=d.getMinutes();
  var ampm=h>=12?'PM':'AM';
  h=h%12||12;
  return h+':'+String(m).padStart(2,'0')+' '+ampm;
}

function fmtDuration(clockIn){
  if(!clockIn)return '';
  var diff=Date.now()-new Date(clockIn).getTime();
  var hrs=Math.floor(diff/3600000);
  var mins=Math.floor((diff%3600000)/60000);
  return hrs+'h '+mins+'m';
}

function renderDashboard(el){
  Promise.all([
    api('/api/time-entries'),api('/api/time-entries?status=pending'),
    api('/api/time-entries/clocked-in'),api('/api/validation/flags'),api('/api/employees')
  ]).then(function(results){
    var all=results[0],pending=results[1],clockedIn=results[2],flags=results[3],emps=results[4];
    var today=new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    el.innerHTML=
      '<div class="page-header"><div><h1>Dashboard</h1><div class="subtitle">'+today+'</div></div></div>'+
      '<div class="stat-grid">'+
        '<div class="stat-card"><div class="value">'+emps.length+'</div><div class="label">Active Employees</div></div>'+
        '<div class="stat-card"><div class="value" style="color:var(--green-600)">'+clockedIn.length+'</div><div class="label">Clocked In Now</div></div>'+
        '<div class="stat-card"><div class="value" style="color:var(--amber-500)">'+pending.length+'</div><div class="label">Pending Review</div></div>'+
        '<div class="stat-card"><div class="value" style="color:var(--red-500)">'+flags.length+'</div><div class="label">Validation Flags</div></div>'+
      '</div>'+
      (clockedIn.length>0?
        '<div class="card"><h2 style="color:var(--green-600)">Currently On The Clock</h2>'+
        clockedIn.map(function(e){
          return '<div style="display:inline-flex;align-items:center;gap:8px;padding:6px 14px;margin:4px;border-radius:20px;background:#f0fdf4;border:1px solid #bbf7d0;font-size:13px">'+
            '<span style="width:8px;height:8px;border-radius:50%;background:var(--green-600)" class="pulse"></span>'+
            '<strong>'+e.first_name+' '+e.last_name+'</strong>'+
            '<span style="color:var(--gray-500)">since '+fmtTime(e.clock_in)+'</span>'+
          '</div>';
        }).join('')+
        '</div>':'')+
      '<div class="card"><h2>Quick Actions</h2>'+
        '<div style="display:flex;gap:12px;flex-wrap:wrap">'+
          '<button class="btn btn-primary" onclick="showPage(\'huddle\')">Crew Huddle (Punch In/Out)</button>'+
          '<button class="btn btn-outline" onclick="showPage(\'manual\')">Manual Entry</button>'+
          '<button class="btn btn-danger" onclick="showPage(\'validation\')">Review Flags ('+flags.length+')</button>'+
          '<button class="btn btn-success" onclick="showPage(\'export\')">Export to Sage 300</button>'+
        '</div>'+
      '</div>';
  });
}

function renderHuddle(el){
  Promise.all([api('/api/employees'),api('/api/time-entries/clocked-in')]).then(function(results){
    var emps=results[0],clockedIn=results[1];
    var workers=emps.filter(function(e){return e.role!=='admin';});
    var crews=[];
    workers.forEach(function(e){if(e.crew_id && crews.indexOf(e.crew_id)===-1)crews.push(e.crew_id);});
    crews.sort();

    var clockedInIds={};
    clockedIn.forEach(function(e){clockedInIds[e.employee_id]=e;});
    var availableWorkers=workers.filter(function(e){return !clockedInIds[e.id];});

    el.innerHTML=
      '<div class="page-header"><div><h1>Crew Huddle</h1><div class="subtitle">Punch your crew in at the morning meeting, punch out at end of day.</div></div></div>'+
      '<div class="tab-bar">'+
        '<div class="tab'+(huddleTab==='punch-in'?' active':'')+'" onclick="switchHuddleTab(\'punch-in\')">Punch In<span class="count">'+availableWorkers.length+' available</span></div>'+
        '<div class="tab'+(huddleTab==='punch-out'?' active':'')+'" onclick="switchHuddleTab(\'punch-out\')">Punch Out<span class="count">'+clockedIn.length+' on clock</span></div>'+
      '</div>'+
      '<div id="tab-punch-in" class="'+(huddleTab!=='punch-in'?'hidden':'')+'">'+
        (availableWorkers.length===0?
          '<div class="card" style="text-align:center;padding:48px"><div style="font-size:18px;font-weight:600;color:var(--green-600)">Everyone is clocked in!</div><div style="color:var(--gray-500);margin-top:8px">All crew members are currently on the clock. Switch to Punch Out to end their shift.</div></div>'
        :
          '<div class="card">'+
            '<h2>Select Crew Members Present (<span id="sel-count">'+selectedCrew.size+'</span> selected)</h2>'+
            '<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">'+
              crews.map(function(c){return '<button class="btn btn-outline btn-sm" onclick="toggleCrew('+c+')">Crew '+c+': Toggle All</button>';}).join('')+
              '<button class="btn btn-outline btn-sm" onclick="selectAll()">Select All</button>'+
              '<button class="btn btn-outline btn-sm" onclick="clearAll()">Clear</button>'+
            '</div>'+
            '<div class="crew-grid">'+
              availableWorkers.map(function(e){
                return '<div class="crew-card'+(selectedCrew.has(e.id)?' selected':'')+'" onclick="toggleEmp('+e.id+')" id="crew-'+e.id+'">'+
                  '<div class="checkmark">'+(selectedCrew.has(e.id)?'&#10003;':'')+'</div>'+
                  '<div class="name">'+e.first_name+' '+e.last_name+'</div>'+
                  '<div class="emp-num">'+e.employee_number+'</div>'+
                  '<div class="emp-num">'+(e.role==='foreman'?'Foreman':'Crew '+(e.crew_id||'—'))+'</div>'+
                '</div>';
              }).join('')+
            '</div>'+
            '<div id="punch-in-photo" style="margin-top:20px">'+
              '<div class="photo-upload" onclick="document.getElementById(\'h-photo\').click()">'+
                '<input type="file" id="h-photo" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(this)"/>'+
                '<div id="photo-placeholder"><div style="font-weight:600;color:var(--gray-700)">Optional: Tap to take proof-of-presence photo</div><div style="font-size:12px;color:var(--gray-500)">JPEG, PNG, or WebP up to 10MB</div></div>'+
                '<img id="photo-preview" style="display:none;max-width:300px;border-radius:8px;margin-top:12px"/>'+
              '</div>'+
            '</div>'+
            '<div style="display:flex;justify-content:flex-end;margin-top:20px">'+
              '<button class="btn btn-success btn-lg" id="punch-in-btn" onclick="doPunchIn()"'+(selectedCrew.size===0?' disabled':'')+'>Punch In '+selectedCrew.size+' Crew Members</button>'+
            '</div>'+
          '</div>'
        )+
      '</div>'+
      '<div id="tab-punch-out" class="'+(huddleTab!=='punch-out'?'hidden':'')+'">'+
        (clockedIn.length===0?
          '<div class="card" style="text-align:center;padding:48px"><div style="font-size:18px;font-weight:600;color:var(--gray-500)">No one is clocked in</div><div style="color:var(--gray-500);margin-top:8px">Use the Punch In tab to clock in crew members first.</div></div>'
        :
          '<div class="card">'+
            '<h2 style="color:var(--green-600)">Currently Clocked In — '+clockedIn.length+' crew members</h2>'+
            '<p style="color:var(--gray-500);font-size:13px;margin-bottom:16px">These employees are on the clock. Punch them out to auto-calculate their hours.</p>'+
            clockedIn.map(function(e){
              return '<div class="clocked-in-card" id="clockedin-'+e.id+'">'+
                '<div class="emp-info">'+
                  '<div class="name">'+e.first_name+' '+e.last_name+'</div>'+
                  '<div class="detail">'+e.employee_number+' &middot; Clocked in '+fmtTime(e.clock_in)+' &middot; <strong>'+fmtDuration(e.clock_in)+'</strong> on clock</div>'+
                '</div>'+
                '<button class="btn btn-outline btn-sm" onclick="punchOutOne('+e.id+')">Punch Out</button>'+
              '</div>';
            }).join('')+
            '<div style="display:flex;justify-content:flex-end;margin-top:20px;gap:12px">'+
              '<button class="btn btn-success btn-lg" onclick="doPunchOutAll()">Punch Out All '+clockedIn.length+' Crew Members</button>'+
            '</div>'+
          '</div>'
        )+
      '</div>';

    window._huddleWorkers=availableWorkers;
    window._clockedIn=clockedIn;
  });
}

window.switchHuddleTab=function(tab){
  huddleTab=tab;
  var tabIn=document.getElementById('tab-punch-in');
  var tabOut=document.getElementById('tab-punch-out');
  if(tabIn)tabIn.classList.toggle('hidden',tab!=='punch-in');
  if(tabOut)tabOut.classList.toggle('hidden',tab!=='punch-out');
  document.querySelectorAll('.tab-bar .tab').forEach(function(t){
    t.classList.toggle('active',t.textContent.toLowerCase().indexOf(tab.replace('-',' '))>=0);
  });
};

window.toggleEmp=function(id){
  if(selectedCrew.has(id))selectedCrew.delete(id);else selectedCrew.add(id);
  var card=document.getElementById('crew-'+id);
  if(card){card.classList.toggle('selected',selectedCrew.has(id));card.querySelector('.checkmark').innerHTML=selectedCrew.has(id)?'&#10003;':'';}
  updatePunchInBtn();
};

window.toggleCrew=function(crewId){
  var members=(window._huddleWorkers||[]).filter(function(e){return e.crew_id===crewId;});
  var allSel=members.every(function(e){return selectedCrew.has(e.id);});
  members.forEach(function(e){if(allSel)selectedCrew.delete(e.id);else selectedCrew.add(e.id);});
  members.forEach(function(e){
    var card=document.getElementById('crew-'+e.id);
    if(card){card.classList.toggle('selected',selectedCrew.has(e.id));card.querySelector('.checkmark').innerHTML=selectedCrew.has(e.id)?'&#10003;':'';}
  });
  updatePunchInBtn();
};

window.selectAll=function(){
  (window._huddleWorkers||[]).forEach(function(e){selectedCrew.add(e.id);});
  (window._huddleWorkers||[]).forEach(function(e){
    var card=document.getElementById('crew-'+e.id);
    if(card){card.classList.add('selected');card.querySelector('.checkmark').innerHTML='&#10003;';}
  });
  updatePunchInBtn();
};

window.clearAll=function(){
  selectedCrew.clear();
  document.querySelectorAll('.crew-card').forEach(function(c){c.classList.remove('selected');c.querySelector('.checkmark').innerHTML='';});
  updatePunchInBtn();
};

function updatePunchInBtn(){
  var cnt=document.getElementById('sel-count');if(cnt)cnt.textContent=selectedCrew.size;
  var btn=document.getElementById('punch-in-btn');
  if(btn){btn.disabled=selectedCrew.size===0;btn.textContent='Punch In '+selectedCrew.size+' Crew Member'+(selectedCrew.size!==1?'s':'');}
}

window.handlePhoto=function(input){
  if(input.files&&input.files[0]){
    photoAttached=true;
    var reader=new FileReader();
    reader.onload=function(e){
      var img=document.getElementById('photo-preview');if(img){img.src=e.target.result;img.style.display='block';}
      var ph=document.getElementById('photo-placeholder');if(ph)ph.style.display='none';
    };
    reader.readAsDataURL(input.files[0]);
  }
};

window.doPunchIn=function(){
  if(selectedCrew.size===0)return;
  var body={employee_ids:Array.from(selectedCrew),foreman_id:1,clock_in:new Date().toISOString()};

window.closeEditModal=function(){
  var container=document.getElementById('edit-modal-container');

};

window.saveEdit=function(entryId){
  var reason=document.getElementById('edit-reason').value;
  if(!reason){showToast('Reason code is REQUIRED for SOX compliance',true);return;}
  if(reason==='other'){
    var note=(document.getElementById('edit-reason-note').value||'').trim();
    if(note.length<5){showToast('Explanation required (min 5 chars) for "Other"',true);return;}
  }
  var ccVal=document.getElementById('edit-cc').value;
  var body={
    cost_code_id:ccVal?parseInt(ccVal):undefined,
    per_diem_location:document.getElementById('edit-pd').value||'',
    notes:document.getElementById('edit-notes').value||'',
    reason_code:reason,
    reason_note:document.getElementById('edit-reason-note')?document.getElementById('edit-reason-note').value:'',
    changed_by:10
  };
  api('/api/time-entries/'+entryId,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(function(result){
    if(result.error){showToast('Error: '+result.error,true);return;}
    showToast('Entry updated — audit trail recorded');
    closeEditModal();
    renderEntries(document.getElementById('main-content'));
  });
};

      '<div class="page-header"><div><h1>SOX Audit Trail</h1><div class="subtitle">Every change recorded with before/after state.</div></div></div>'+
      '<div class="card" style="padding:0"><table><thead><tr><th>Timestamp</th><th>Table</th><th>Record</th><th>Action</th><th>Changed By</th><th>Reason</th><th>Details</th></tr></thead>'+
      '<tbody>'+(logs.length===0?'<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--gray-500)">No audit entries yet. Approve, edit, or punch out a time entry to see the audit trail.</td></tr>':
      logs.map(function(l){
        return '<tr><td style="font-size:12px;font-family:monospace">'+new Date(l.created_at).toLocaleString()+'</td><td><span class="badge" style="background:#e0e7ff;color:#3730a3">'+l.table_name+'</span></td><td>#'+l.record_id+'</td><td><span class="badge '+(l.action==='DELETE'?'badge-flagged':'badge-pending')+'">'+l.action+'</span></td><td>'+(l.first_name?l.first_name+' '+l.last_name:'User #'+l.changed_by)+'</td><td>'+(l.change_reason||'—')+'</td><td><button class="btn btn-outline btn-sm" onclick="toggleAuditDetail('+l.id+')">Show</button></td></tr>'+
        '<tr id="audit-detail-'+l.id+'" style="display:none"><td colspan="7" style="background:var(--gray-50);padding:16px"><div style="display:grid;grid-template-columns:1fr 1fr;gap:16px"><div><strong style="font-size:12px;color:var(--red-500)">BEFORE</strong><pre style="background:#fef2f2;padding:12px;border-radius:6px;font-size:12px;overflow:auto;max-height:300px;margin-top:4px">'+(l.before_state?JSON.stringify(l.before_state,null,2):'N/A')+'</pre></div><div><strong style="font-size:12px;color:var(--green-600)">AFTER</strong><pre style="background:#f0fdf4;padding:12px;border-radius:6px;font-size:12px;overflow:auto;max-height:300px;margin-top:4px">'+(l.after_state?JSON.stringify(l.after_state,null,2):'N/A')+'</pre></div></div></td></tr>';
      }).join(''))+'</tbody></table></div>';
  });
}

window.toggleAuditDetail=function(id){var el=document.getElementById('audit-detail-'+id);if(el)el.style.display=el.style.display==='none'?'':'none';};

showPage('dashboard');
</script>
</body>
</html>
