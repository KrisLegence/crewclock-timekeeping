<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CrewClock — Timekeeping System</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue-600:#2563eb;--blue-700:#1d4ed8;--green-600:#16a34a;--green-700:#15803d;--red-500:#ef4444;--amber-500:#f59e0b;--gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;--gray-300:#d1d5db;--gray-500:#6b7280;--gray-700:#374151;--gray-900:#111827;--radius:8px;--shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);--shadow-lg:0 10px 15px -3px rgba(0,0,0,.1),0 4px 6px rgba(0,0,0,.05)}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--gray-50);color:var(--gray-900);line-height:1.5}
.app{display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--gray-900);color:#fff;padding:24px 0;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
.sidebar .logo{padding:0 20px 24px;font-size:20px;font-weight:700;letter-spacing:-.5px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar .logo span{color:var(--blue-600)}
.sidebar nav{flex:1;padding:16px 0}
.sidebar a{display:flex;align-items:center;gap:10px;padding:10px 20px;color:var(--gray-300);text-decoration:none;font-size:14px;font-weight:500;transition:all .15s;cursor:pointer}
.sidebar a:hover,.sidebar a.active{background:rgba(255,255,255,.08);color:#fff}
.sidebar a.active{border-left:3px solid var(--blue-600)}
.main{flex:1;padding:32px;max-width:1200px;margin-left:240px}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.page-header h1{font-size:24px;font-weight:700}
.page-header .subtitle{color:var(--gray-500);font-size:14px;margin-top:2px}
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;margin-bottom:20px}
.card h2{font-size:16px;font-weight:600;margin-bottom:16px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;text-align:center}
.stat-card .value{font-size:32px;font-weight:700;color:var(--blue-600)}
.stat-card .label{font-size:13px;color:var(--gray-500);margin-top:4px}
input,select,textarea{width:100%;padding:8px 12px;border:1px solid var(--gray-300);border-radius:var(--radius);font-size:14px;font-family:inherit;transition:border-color .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue-600);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
label{display:block;font-size:13px;font-weight:600;margin-bottom:4px;color:var(--gray-700)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.form-group{margin-bottom:16px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit}
.btn-primary{background:var(--blue-600);color:#fff}.btn-primary:hover{background:var(--blue-700)}
.btn-success{background:var(--green-600);color:#fff}.btn-success:hover{background:var(--green-700)}
.btn-danger{background:var(--red-500);color:#fff}.btn-danger:hover{background:#dc2626}
.btn-outline{background:#fff;color:var(--gray-700);border:1px solid var(--gray-300)}.btn-outline:hover{background:var(--gray-50)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-lg{padding:14px 32px;font-size:16px}
.btn:disabled{opacity:.5;cursor:not-allowed}
table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:left;padding:10px 12px;background:var(--gray-50);border-bottom:2px solid var(--gray-200);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-500)}
td{padding:10px 12px;border-bottom:1px solid var(--gray-100)}
tr:hover td{background:var(--gray-50)}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:12px;font-weight:600}
.badge-pending{background:#fef3c7;color:#92400e}
.badge-approved{background:#d1fae5;color:#065f46}
.badge-flagged{background:#fee2e2;color:#991b1b}
.badge-clocked-in{background:#dbeafe;color:#1e40af}
.crew-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin:16px 0}
.crew-card{border:2px solid var(--gray-200);border-radius:var(--radius);padding:16px;text-align:center;cursor:pointer;transition:all .15s;user-select:none}
.crew-card:hover{border-color:var(--blue-600)}
.crew-card.selected{border-color:var(--blue-600);background:#eff6ff}
.crew-card .name{font-weight:600;font-size:15px}
.crew-card .emp-num{font-size:12px;color:var(--gray-500)}
.crew-card .checkmark{width:24px;height:24px;border-radius:50%;border:2px solid var(--gray-300);margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:14px}
.crew-card.selected .checkmark{background:var(--blue-600);border-color:var(--blue-600);color:#fff}
.clocked-in-card{border:2px solid var(--green-600);border-radius:var(--radius);padding:16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;background:#f0fdf4}
.clocked-in-card .emp-info .name{font-weight:600;font-size:15px}
.clocked-in-card .emp-info .detail{font-size:12px;color:var(--gray-500)}
.clocked-in-card .clock-time{font-family:monospace;font-size:14px;color:var(--green-700);font-weight:600}
.tab-bar{display:flex;gap:0;margin-bottom:24px;border-bottom:2px solid var(--gray-200)}
.tab{padding:12px 24px;font-size:14px;font-weight:600;cursor:pointer;color:var(--gray-500);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab:hover{color:var(--gray-700)}
.tab.active{color:var(--blue-600);border-bottom-color:var(--blue-600)}
.tab .count{background:var(--gray-200);color:var(--gray-700);padding:1px 8px;border-radius:10px;font-size:12px;margin-left:6px}
.tab.active .count{background:var(--blue-600);color:#fff}
.flag-card{border-left:4px solid var(--red-500);background:#fff;border-radius:0 var(--radius) var(--radius) 0;box-shadow:var(--shadow);padding:16px 20px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.flag-card .flag-type{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--red-500);font-weight:700}
.flag-card .flag-msg{font-size:14px;margin-top:4px}
.photo-upload{border:2px dashed var(--gray-300);border-radius:var(--radius);padding:32px;text-align:center;cursor:pointer;transition:all .15s}
.photo-upload:hover{border-color:var(--blue-600);background:#eff6ff}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;background:var(--green-600);color:#fff;border-radius:var(--radius);box-shadow:var(--shadow-lg);font-weight:600;font-size:14px;z-index:2000;animation:slideIn .3s ease}
@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@media(max-width:768px){.sidebar{width:60px}.sidebar .logo span,.sidebar a span{display:none}.main{margin-left:60px;padding:16px}.form-row{grid-template-columns:1fr}.crew-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}}
.hidden{display:none}
.pulse{animation:pulse 2s infinite}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1500;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease}
.modal{background:#fff;border-radius:12px;box-shadow:var(--shadow-lg);width:560px;max-width:90vw;max-height:90vh;overflow-y:auto;padding:0}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--gray-200);display:flex;justify-content:space-between;align-items:center}
.modal-header h2{font-size:18px;font-weight:700;margin:0}
.modal-header .close-btn{background:none;border:none;font-size:24px;cursor:pointer;color:var(--gray-500);padding:0 4px;line-height:1}
.modal-header .close-btn:hover{color:var(--gray-900)}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--gray-200);display:flex;justify-content:flex-end;gap:12px}
.read-only-field{padding:8px 12px;background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--radius);font-size:14px;color:var(--gray-700)}
.role-select-wrap{padding:12px 20px;border-bottom:1px solid rgba(255,255,255,.1)}
.role-select-wrap label{color:rgba(255,255,255,.5);font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.role-select-wrap select{width:100%;background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:8px 10px;font-size:13px;font-family:inherit}
.role-select-wrap select option{background:var(--gray-900);color:#fff}
.status-banner{border-radius:var(--radius);padding:24px;text-align:center;margin-bottom:20px}
.status-banner.clocked-in{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:2px solid var(--green-600)}
.status-banner.clocked-out{background:linear-gradient(135deg,#f9fafb,#f3f4f6);border:2px solid var(--gray-300)}
.time-off-type{display:inline-block;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:600}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar" id="sidebar">
  <div class="logo">Crew<span>Clock</span></div>
  <div class="role-select-wrap">
    <label>Demo As</label>
    <select id="role-select" onchange="switchRole(this.value)">
      <option value="admin">Office Admin</option>
      <option value="foreman">Foreman</option>
      <option value="field">Field Technician</option>
    </select>
    <div id="emp-select-wrap" style="display:none;margin-top:8px">
      <label>Employee</label>
      <select id="emp-select" onchange="switchEmployee(parseInt(this.value))"></select>
    </div>
  </div>
  <nav id="sidebar-nav"></nav>
  <div style="padding:0 20px;font-size:11px;color:rgba(255,255,255,.3)">v1.1 &middot; SOX Compliant</div>
</aside>
<main class="main" id="main-content"></main>
</div>

<div id="toast-container"></div>

<script>
const API='';
let currentPage='dashboard',huddleTab='punch-in',selectedCrew=new Set(),photoAttached=false;
let currentRole='admin',currentEmployeeId=null;
var cachedEmployees=[];

function showToast(msg,isError){
  const c=document.getElementById('toast-container');
  c.innerHTML='<div class="toast" style="background:'+(isError?'var(--red-500)':'var(--green-600)')+'">'+msg+'</div>';
  setTimeout(function(){c.innerHTML='';},3000);
}

window.showPage=function(page){
  currentPage=page;
  document.querySelectorAll('#sidebar-nav a').forEach(function(a){a.classList.toggle('active',a.dataset.page===page);});
  var main=document.getElementById('main-content');
  switch(page){
    case 'dashboard':renderDashboard(main);break;
    case 'huddle':renderHuddle(main);break;
    case 'entries':renderEntries(main);break;
    case 'manual':renderManual(main);break;
    case 'validation':renderValidation(main);break;
    case 'export':renderExport(main);break;
    case 'audit':renderAudit(main);break;
    case 'my-dashboard':renderMyDashboard(main);break;
    case 'my-timecard':renderMyTimecard(main);break;
    case 'time-off':renderTimeOff(main);break;
    case 'manage-time-off':renderManageTimeOff(main);break;
  }
};

function api(path,opts){return fetch(API+path,opts).then(function(res){return res.json();});}

function fmtTime(iso){
  if(!iso)return '—';
  var d=new Date(iso);
  var h=d.getHours(),m=d.getMinutes();
  var ampm=h>=12?'PM':'AM';
  h=h%12||12;
  return h+':'+String(m).padStart(2,'0')+' '+ampm;
}

function fmtDuration(clockIn){
  if(!clockIn)return '';
  var diff=Date.now()-new Date(clockIn).getTime();
  var hrs=Math.floor(diff/3600000);
  var mins=Math.floor((diff%3600000)/60000);
  return hrs+'h '+mins+'m';
}

function renderDashboard(el){
  Promise.all([
    api('/api/time-entries'),api('/api/time-entries?status=pending'),
    api('/api/time-entries/clocked-in'),api('/api/validation/flags'),api('/api/employees')
  ]).then(function(results){
    var all=results[0],pending=results[1],clockedIn=results[2],flags=results[3],emps=results[4];
    var today=new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    el.innerHTML=
      '<div class="page-header"><div><h1>Dashboard</h1><div class="subtitle">'+today+'</div></div></div>'+
      '<div class="stat-grid">'+
        '<div class="stat-card"><div class="value">'+emps.length+'</div><div class="label">Active Employees</div></div>'+
        '<div class="stat-card"><div class="value" style="color:var(--green-600)">'+clockedIn.length+'</div><div class="label">Clocked In Now</div></div>'+
        '<div class="stat-card"><div class="value" style="color:var(--amber-500)">'+pending.length+'</div><div class="label">Pending Review</div></div>'+
        '<div class="stat-card"><div class="value" style="color:var(--red-500)">'+flags.length+'</div><div class="label">Validation Flags</div></div>'+
      '</div>'+
      (clockedIn.length>0?
        '<div class="card"><h2 style="color:var(--green-600)">Currently On The Clock</h2>'+
        clockedIn.map(function(e){
          return '<div style="display:inline-flex;align-items:center;gap:8px;padding:6px 14px;margin:4px;border-radius:20px;background:#f0fdf4;border:1px solid #bbf7d0;font-size:13px">'+
            '<span style="width:8px;height:8px;border-radius:50%;background:var(--green-600)" class="pulse"></span>'+
            '<strong>'+e.first_name+' '+e.last_name+'</strong>'+
            '<span style="color:var(--gray-500)">since '+fmtTime(e.clock_in)+'</span>'+
          '</div>';
        }).join('')+
        '</div>':'')+
      '<div class="card"><h2>Quick Actions</h2>'+
        '<div style="display:flex;gap:12px;flex-wrap:wrap">'+
          '<button class="btn btn-primary" onclick="showPage(\'huddle\')">Crew Huddle (Punch In/Out)</button>'+
          '<button class="btn btn-outline" onclick="showPage(\'manual\')">Manual Entry</button>'+
          '<button class="btn btn-danger" onclick="showPage(\'validation\')">Review Flags ('+flags.length+')</button>'+
          '<button class="btn btn-success" onclick="showPage(\'export\')">Export to Sage 300</button>'+
        '</div>'+
      '</div>';
  });
}

function renderHuddle(el){
  Promise.all([api('/api/employees'),api('/api/time-entries/clocked-in')]).then(function(results){
    var emps=results[0],clockedIn=results[1];
    var workers=emps.filter(function(e){return e.role!=='admin';});
    var crews=[];
    workers.forEach(function(e){if(e.crew_id && crews.indexOf(e.crew_id)===-1)crews.push(e.crew_id);});
    crews.sort();

    var clockedInIds={};
    clockedIn.forEach(function(e){clockedInIds[e.employee_id]=e;});
    var availableWorkers=workers.filter(function(e){return !clockedInIds[e.id];});

    el.innerHTML=
      '<div class="page-header"><div><h1>Crew Huddle</h1><div class="subtitle">Punch your crew in at the morning meeting, punch out at end of day.</div></div></div>'+
      '<div class="tab-bar">'+
        '<div class="tab'+(huddleTab==='punch-in'?' active':'')+'" onclick="switchHuddleTab(\'punch-in\')">Punch In<span class="count">'+availableWorkers.length+' available</span></div>'+
        '<div class="tab'+(huddleTab==='punch-out'?' active':'')+'" onclick="switchHuddleTab(\'punch-out\')">Punch Out<span class="count">'+clockedIn.length+' on clock</span></div>'+
      '</div>'+
      '<div id="tab-punch-in" class="'+(huddleTab!=='punch-in'?'hidden':'')+'">'+
        (availableWorkers.length===0?
          '<div class="card" style="text-align:center;padding:48px"><div style="font-size:18px;font-weight:600;color:var(--green-600)">Everyone is clocked in!</div><div style="color:var(--gray-500);margin-top:8px">All crew members are currently on the clock. Switch to Punch Out to end their shift.</div></div>'
        :
          '<div class="card">'+
            '<h2>Select Crew Members Present (<span id="sel-count">'+selectedCrew.size+'</span> selected)</h2>'+
            '<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">'+
              crews.map(function(c){return '<button class="btn btn-outline btn-sm" onclick="toggleCrew('+c+')">Crew '+c+': Toggle All</button>';}).join('')+
              '<button class="btn btn-outline btn-sm" onclick="selectAll()">Select All</button>'+
              '<button class="btn btn-outline btn-sm" onclick="clearAll()">Clear</button>'+
            '</div>'+
            '<div class="crew-grid">'+
              availableWorkers.map(function(e){
                return '<div class="crew-card'+(selectedCrew.has(e.id)?' selected':'')+'" onclick="toggleEmp('+e.id+')" id="crew-'+e.id+'">'+
                  '<div class="checkmark">'+(selectedCrew.has(e.id)?'&#10003;':'')+'</div>'+
                  '<div class="name">'+e.first_name+' '+e.last_name+'</div>'+
                  '<div class="emp-num">'+e.employee_number+'</div>'+
                  '<div class="emp-num">'+(e.role==='foreman'?'Foreman':'Crew '+(e.crew_id||'—'))+'</div>'+
                '</div>';
              }).join('')+
            '</div>'+
            '<div id="punch-in-photo" style="margin-top:20px">'+
              '<div class="photo-upload" onclick="document.getElementById(\'h-photo\').click()">'+
                '<input type="file" id="h-photo" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(this)"/>'+
                '<div id="photo-placeholder"><div style="font-weight:600;color:var(--gray-700)">Optional: Tap to take proof-of-presence photo</div><div style="font-size:12px;color:var(--gray-500)">JPEG, PNG, or WebP up to 10MB</div></div>'+
                '<img id="photo-preview" style="display:none;max-width:300px;border-radius:8px;margin-top:12px"/>'+
              '</div>'+
            '</div>'+
            '<div style="display:flex;justify-content:flex-end;margin-top:20px">'+
              '<button class="btn btn-success btn-lg" id="punch-in-btn" onclick="doPunchIn()"'+(selectedCrew.size===0?' disabled':'')+'>Punch In '+selectedCrew.size+' Crew Members</button>'+
            '</div>'+
          '</div>'
        )+
      '</div>'+
      '<div id="tab-punch-out" class="'+(huddleTab!=='punch-out'?'hidden':'')+'">'+
        (clockedIn.length===0?
          '<div class="card" style="text-align:center;padding:48px"><div style="font-size:18px;font-weight:600;color:var(--gray-500)">No one is clocked in</div><div style="color:var(--gray-500);margin-top:8px">Use the Punch In tab to clock in crew members first.</div></div>'
        :
          '<div class="card">'+
            '<h2 style="color:var(--green-600)">Currently Clocked In — '+clockedIn.length+' crew members</h2>'+
            '<p style="color:var(--gray-500);font-size:13px;margin-bottom:16px">These employees are on the clock. Punch them out to auto-calculate their hours.</p>'+
            clockedIn.map(function(e){
              return '<div class="clocked-in-card" id="clockedin-'+e.id+'">'+
                '<div class="emp-info">'+
                  '<div class="name">'+e.first_name+' '+e.last_name+'</div>'+
                  '<div class="detail">'+e.employee_number+' &middot; Clocked in '+fmtTime(e.clock_in)+' &middot; <strong>'+fmtDuration(e.clock_in)+'</strong> on clock</div>'+
                '</div>'+
                '<button class="btn btn-outline btn-sm" onclick="punchOutOne('+e.id+')">Punch Out</button>'+
              '</div>';
            }).join('')+
            '<div style="display:flex;justify-content:flex-end;margin-top:20px;gap:12px">'+
              '<button class="btn btn-success btn-lg" onclick="doPunchOutAll()">Punch Out All '+clockedIn.length+' Crew Members</button>'+
            '</div>'+
          '</div>'
        )+
      '</div>';

    window._huddleWorkers=availableWorkers;
    window._clockedIn=clockedIn;
  });
}

window.switchHuddleTab=function(tab){
  huddleTab=tab;
  var tabIn=document.getElementById('tab-punch-in');
  var tabOut=document.getElementById('tab-punch-out');
  if(tabIn)tabIn.classList.toggle('hidden',tab!=='punch-in');
  if(tabOut)tabOut.classList.toggle('hidden',tab!=='punch-out');
  document.querySelectorAll('.tab-bar .tab').forEach(function(t){
    t.classList.toggle('active',t.textContent.toLowerCase().indexOf(tab.replace('-',' '))>=0);
  });
};

window.toggleEmp=function(id){
  if(selectedCrew.has(id))selectedCrew.delete(id);else selectedCrew.add(id);
  var card=document.getElementById('crew-'+id);
  if(card){card.classList.toggle('selected',selectedCrew.has(id));card.querySelector('.checkmark').innerHTML=selectedCrew.has(id)?'&#10003;':'';}
  updatePunchInBtn();
};

window.toggleCrew=function(crewId){
  var members=(window._huddleWorkers||[]).filter(function(e){return e.crew_id===crewId;});
  var allSel=members.every(function(e){return selectedCrew.has(e.id);});
  members.forEach(function(e){if(allSel)selectedCrew.delete(e.id);else selectedCrew.add(e.id);});
  members.forEach(function(e){
    var card=document.getElementById('crew-'+e.id);
    if(card){card.classList.toggle('selected',selectedCrew.has(e.id));card.querySelector('.checkmark').innerHTML=selectedCrew.has(e.id)?'&#10003;':'';}
  });
  updatePunchInBtn();
};

window.selectAll=function(){
  (window._huddleWorkers||[]).forEach(function(e){selectedCrew.add(e.id);});
  (window._huddleWorkers||[]).forEach(function(e){
    var card=document.getElementById('crew-'+e.id);
    if(card){card.classList.add('selected');card.querySelector('.checkmark').innerHTML='&#10003;';}
  });
  updatePunchInBtn();
};

window.clearAll=function(){
  selectedCrew.clear();
  document.querySelectorAll('.crew-card').forEach(function(c){c.classList.remove('selected');c.querySelector('.checkmark').innerHTML='';});
  updatePunchInBtn();
};

function updatePunchInBtn(){
  var cnt=document.getElementById('sel-count');if(cnt)cnt.textContent=selectedCrew.size;
  var btn=document.getElementById('punch-in-btn');
  if(btn){btn.disabled=selectedCrew.size===0;btn.textContent='Punch In '+selectedCrew.size+' Crew Member'+(selectedCrew.size!==1?'s':'');}
}

window.handlePhoto=function(input){
  if(input.files&&input.files[0]){
    photoAttached=true;
    var reader=new FileReader();
    reader.onload=function(e){
      var img=document.getElementById('photo-preview');if(img){img.src=e.target.result;img.style.display='block';}
      var ph=document.getElementById('photo-placeholder');if(ph)ph.style.display='none';
    };
    reader.readAsDataURL(input.files[0]);
  }
};

window.doPunchIn=function(){
  if(selectedCrew.size===0)return;
  var body={employee_ids:Array.from(selectedCrew),foreman_id:1,clock_in:new Date().toISOString()};
  api('/api/time-entries/punch-in',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(function(result){
    if(result.error){showToast('Error: '+result.error,true);return;}
    var msg=result.punched_in+' crew member'+(result.punched_in!==1?'s':'')+' punched in';
    if(result.already_clocked_in&&result.already_clocked_in.length>0){msg+=' ('+result.already_clocked_in.length+' already on clock)';}
    showToast(msg);
    selectedCrew.clear();photoAttached=false;
    renderHuddle(document.getElementById('main-content'));
  });
};

window.doPunchOutAll=function(){
  var ids=(window._clockedIn||[]).map(function(e){return e.id;});
  if(ids.length===0)return;
  var body={entry_ids:ids,foreman_id:1,clock_out:new Date().toISOString()};
  api('/api/time-entries/punch-out',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(function(result){
    if(result.error){showToast('Error: '+result.error,true);return;}
    showToast(result.punched_out+' crew member'+(result.punched_out!==1?'s':'')+' punched out — hours calculated');
    renderHuddle(document.getElementById('main-content'));
  });
};

window.punchOutOne=function(entryId){
  var body={entry_ids:[entryId],foreman_id:1,clock_out:new Date().toISOString()};
  api('/api/time-entries/punch-out',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(function(result){
    if(result.error){showToast('Error: '+result.error,true);return;}
    if(result.entries&&result.entries.length>0){
      var e=result.entries[0];
      var total=Number(e.hours_regular)+Number(e.hours_overtime)+Number(e.hours_double);
      showToast(e.first_name+' '+e.last_name+' punched out — '+total.toFixed(1)+'h logged');
    }else{
      showToast('Punched out');
    }
    renderHuddle(document.getElementById('main-content'));
  });
};

    var sb=function(s){return({pending:'badge-pending',approved:'badge-approved',flagged:'badge-flagged',rejected:'badge-flagged',clocked_in:'badge-clocked-in'}[s]||'');};

            '<td style="font-family:monospace;font-size:12px">'+(e.clock_out?fmtTime(e.clock_out):(e.status==='clocked_in'?'<span class="pulse" style="color:var(--green-600);font-weight:700">ON CLOCK</span>':'—'))+'</td>'+
            '<td>'+(e.cost_code_value?'<span style="font-family:monospace">'+e.cost_code_value+'</span><br><span style="font-size:11px;color:var(--gray-500)">'+(e.job_number||'')+'</span>':(e.time_off_type?'<span class="time-off-type" style="background:'+(TO_TYPE_COLORS[e.time_off_type]||['#eee','#333'])[0]+';color:'+(TO_TYPE_COLORS[e.time_off_type]||['#eee','#333'])[1]+'">'+(TO_TYPE_LABELS[e.time_off_type]||e.time_off_type)+'</span>':'<span style="color:var(--amber-500);font-size:12px;font-weight:600">Unassigned</span>'))+'</td>'+
            '<td>'+(total>0?Number(e.hours_regular).toFixed(1):'—')+'</td>'+
            '<td>'+(Number(e.hours_overtime)>0?'<strong style="color:var(--amber-500)">'+Number(e.hours_overtime).toFixed(1)+'</strong>':'—')+'</td>'+
            '<td>'+(Number(e.hours_double)>0?'<strong style="color:var(--red-500)">'+Number(e.hours_double).toFixed(1)+'</strong>':'—')+'</td>'+
            '<td>'+(Number(e.per_diem)>0?'$'+Number(e.per_diem).toFixed(0):'—')+'</td>'+
            '<td><span class="badge" style="background:'+(e.source==='time_off'?'#fce7f3;color:#9d174d':'#e0e7ff;color:#3730a3')+'">'+(e.source==='time_off'?'time off':e.source)+'</span></td>'+

window.approveEntry=function(id){
  api('/api/time-entries/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:'approved',reason_code:'supervisor_override',approved_by:10,changed_by:10})}).then(function(){
    showToast('Entry approved');renderEntries(document.getElementById('main-content'));
  });
};

function toLocalDatetime(iso){
  if(!iso)return '';
  var d=new Date(iso);
  var y=d.getFullYear(),mo=String(d.getMonth()+1).padStart(2,'0'),da=String(d.getDate()).padStart(2,'0');
  var h=String(d.getHours()).padStart(2,'0'),mi=String(d.getMinutes()).padStart(2,'0');
  return y+'-'+mo+'-'+da+'T'+h+':'+mi;
}

function recalcEditHours(){
  var ciVal=document.getElementById('edit-clockin').value;
  var coVal=document.getElementById('edit-clockout').value;
  var preview=document.getElementById('edit-hours-preview');
  if(!preview)return;
  if(ciVal&&coVal){
    var diff=new Date(coVal).getTime()-new Date(ciVal).getTime();
    var total=Math.round((diff/3600000)*100)/100;
    if(total<0){preview.innerHTML='<span style="color:var(--red-500);font-weight:600">Clock out is before clock in</span>';return;}
    var reg=Math.min(total,8),ot=Math.min(Math.max(total-8,0),4),dt=Math.max(total-12,0);
    preview.innerHTML='<strong>'+total.toFixed(1)+'h total</strong> &mdash; '+
      reg.toFixed(1)+'h regular'+
      (ot>0?' + <span style="color:var(--amber-500);font-weight:600">'+ot.toFixed(1)+'h OT</span>':'')+
      (dt>0?' + <span style="color:var(--red-500);font-weight:600">'+dt.toFixed(1)+'h DT</span>':'');
  }else if(ciVal&&!coVal){
    preview.innerHTML='<span style="color:var(--green-600)">Still on clock — hours will calculate on punch out</span>';
  }else{
    preview.innerHTML='<span style="color:var(--gray-400)">Set clock in/out to calculate hours</span>';
  }
}

window.closeEditModal=function(){
  var container=document.getElementById('edit-modal-container');
  if(container)container.innerHTML='';
};

window.saveEdit=function(entryId){
  var reason=document.getElementById('edit-reason').value;
  if(!reason){showToast('Reason code is REQUIRED for SOX compliance',true);return;}
  if(reason==='other'){
    var note=(document.getElementById('edit-reason-note').value||'').trim();
    if(note.length<5){showToast('Explanation required (min 5 chars) for "Other"',true);return;}
  }
  var ccVal=document.getElementById('edit-cc').value;
  var dateVal=document.getElementById('edit-date').value;
  var ciVal=document.getElementById('edit-clockin').value;
  var coVal=document.getElementById('edit-clockout').value;
  var body={
    cost_code_id:ccVal?parseInt(ccVal):undefined,
    per_diem_location:document.getElementById('edit-pd').value||'',
    notes:document.getElementById('edit-notes').value||'',
    reason_code:reason,
    reason_note:document.getElementById('edit-reason-note')?document.getElementById('edit-reason-note').value:'',
    changed_by:10,
    work_date:dateVal||undefined,
    clock_in:ciVal?new Date(ciVal).toISOString():undefined,
    clock_out:coVal?new Date(coVal).toISOString():undefined
  };
  api('/api/time-entries/'+entryId,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(function(result){
    if(result.error){showToast('Error: '+result.error,true);return;}
    showToast('Entry updated — audit trail recorded');
    closeEditModal();
    renderEntries(document.getElementById('main-content'));
  });
};

window.toggleManualType=function(type){
  var isTimeOff=type==='timeoff';
  document.getElementById('m-cc-wrap').style.display=isTimeOff?'none':'';
  document.getElementById('m-to-type-wrap').style.display=isTimeOff?'':'none';
  document.getElementById('m-perdiem-wrap').style.display=isTimeOff?'none':'';
  document.getElementById('m-notes-only-wrap').style.display=isTimeOff?'':'none';
  var ccSel=document.getElementById('m-cc');
  if(isTimeOff){ccSel.removeAttribute('required');}else{ccSel.setAttribute('required','');}
  document.getElementById('m-type-work-label').style.borderColor=isTimeOff?'var(--gray-200)':'var(--blue-600)';
  document.getElementById('m-type-work-label').style.background=isTimeOff?'':'#eff6ff';
  document.getElementById('m-type-timeoff-label').style.borderColor=isTimeOff?'var(--blue-600)':'var(--gray-200)';
  document.getElementById('m-type-timeoff-label').style.background=isTimeOff?'#eff6ff':'';
};

window.submitManual=function(e){
  e.preventDefault();
  var reason=document.getElementById('m-reason').value;
  if(!reason){showToast('Reason code is REQUIRED for manual entries',true);return;}
  if(reason==='other'){var note=(document.getElementById('m-reason-note').value||'').trim();if(note.length<5){showToast('Explanation required (min 5 chars) for "Other"',true);return;}}
  var isTimeOff=document.querySelector('input[name="m-entry-type"]:checked').value==='timeoff';
  var body={
    employee_id:parseInt(document.getElementById('m-emp').value),
    work_date:document.getElementById('m-date').value,
    total_hours:parseFloat(document.getElementById('m-hours').value),
    reason_code:reason,
    reason_note:document.getElementById('m-reason-note')?document.getElementById('m-reason-note').value:null,
    created_by:15
  };
  if(isTimeOff){
    body.source='time_off';
    body.time_off_type=document.getElementById('m-to-type').value;
    body.notes=document.getElementById('m-notes-to').value||null;
    body.cost_code_id=null;
  }else{
    body.source='manual';
    body.cost_code_id=parseInt(document.getElementById('m-cc').value);
    body.per_diem_location=document.getElementById('m-loc').value||null;
    body.notes=document.getElementById('m-notes').value||null;
  }
  api('/api/time-entries',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(function(result){
    if(result.error){showToast('Error: '+result.error,true);return;}
    showToast('Entry saved successfully');showPage('manual');
  });
};

function renderValidation(el){

var FIELD_LABELS={
  status:'Status',cost_code_id:'Cost Code ID',per_diem_location:'Per Diem Location',per_diem:'Per Diem Amount',
  notes:'Notes',reason_code:'Reason Code',reason_note:'Reason Note',approved_by:'Approved By',approved_at:'Approved At',
  clock_out:'Clock Out',hours_regular:'Regular Hours',hours_overtime:'Overtime Hours',hours_double:'Double Time Hours',
  updated_at:'Updated At',foreman_id:'Foreman ID',employee_id:'Employee ID',work_date:'Work Date',clock_in:'Clock In',
  source:'Source',created_by:'Created By',created_at:'Created At',
  type:'Type',start_date:'Start Date',end_date:'End Date',total_hours:'Total Hours',
  requested_at:'Requested At',reviewed_by:'Reviewed By',reviewed_at:'Reviewed At'
};
var SKIP_FIELDS={id:1,updated_at:1};

function diffStates(before,after){
  if(!after)return[];
  var changes=[];
  var keys=Object.keys(after);
  var SHOW_CREATE={employee_id:1,work_date:1,clock_in:1,clock_out:1,status:1,source:1,type:1,start_date:1,end_date:1,total_hours:1};
  for(var i=0;i<keys.length;i++){
    var k=keys[i];
    if(SKIP_FIELDS[k])continue;
    if(!before){
      if(!SHOW_CREATE[k])continue;
      var av2=after[k];
      if(av2==null||av2==='')continue;
      changes.push({field:FIELD_LABELS[k]||k,before:'(new)',after:String(av2)});
    }else{
      var bv=before[k],av=after[k];
      if(bv==null)bv='';
      if(av==null)av='';
      if(String(bv)!==String(av)){
        changes.push({field:FIELD_LABELS[k]||k,before:bv===''?'(empty)':String(bv),after:av===''?'(empty)':String(av)});
      }
    }
  }
  return changes;
}

function fmtAuditVal(v){
  if(v===null||v===undefined||v==='')return '<span style="color:var(--gray-400);font-style:italic">(empty)</span>';
  return String(v).replace(/</g,'&lt;');
}

function buildAuditCSV(logs){
  var rows=['Timestamp,Action,Entry #,Changed By,Reason,Reason Note,Field Changed,Before,After'];
  for(var i=0;i<logs.length;i++){
    var l=logs[i];
    var who=l.first_name?l.first_name+' '+l.last_name:'User #'+l.changed_by;
    var ts=new Date(l.created_at).toLocaleString();
    var changes=diffStates(l.before_state,l.after_state);
    if(changes.length===0){
      rows.push(['"'+ts+'"',l.action,'#'+l.record_id,'"'+who+'"','"'+(l.change_reason||'')+'"','"'+(l.change_note||'')+'"','—','—','—'].join(','));
    }else{
      for(var j=0;j<changes.length;j++){
        var c=changes[j];
        rows.push(['"'+ts+'"',l.action,'#'+l.record_id,'"'+who+'"','"'+(l.change_reason||'')+'"','"'+(l.change_note||'')+'"','"'+c.field+'"','"'+c.before.replace(/"/g,'""')+'"','"'+c.after.replace(/"/g,'""')+'"'].join(','));
      }
    }
  }
  return rows.join('\r\n');
}

    if(logs.length===0){

    }else{
      for(var i=0;i<logs.length;i++){
        var l=logs[i];
        var who=l.first_name?l.first_name+' '+l.last_name:'User #'+l.changed_by;
        var ts=new Date(l.created_at).toLocaleString();
        var changes=diffStates(l.before_state,l.after_state);
        var actionBadge=l.action==='PUNCH_OUT'||l.action==='APPROVE'||l.action==='TIME_OFF_APPROVE'?'badge-approved':l.action==='DELETE'||l.action==='TIME_OFF_DENY'?'badge-flagged':l.action==='PUNCH_IN'||l.action==='CREATE'?'badge-clocked-in':'badge-pending';
        if(changes.length===0){

            '<td style="color:var(--gray-500);font-style:italic">No field changes</td>'+
            '<td>—</td><td>—</td></tr>';
        }else{
          for(var j=0;j<changes.length;j++){
            var c=changes[j];
            tableRows+='<tr'+(j>0?' style="border-top:none"':'')+'>'+
              (j===0?
                '<td style="font-size:12px;font-family:monospace;white-space:nowrap" rowspan="'+changes.length+'">'+ts+'</td>'+
                '<td rowspan="'+changes.length+'"><span class="badge '+actionBadge+'">'+l.action+'</span></td>'+

            '</tr>';
          }
        }
      }
    }

    el.innerHTML=
      '<div class="page-header"><div><h1>SOX Audit Trail</h1><div class="subtitle">Every change recorded field-by-field with before/after values.</div></div>'+
        (logs.length>0?'<button class="btn btn-outline" onclick="downloadAuditCSV()">Export to CSV</button>':'')+

        '<div class="stat-card"><div class="value" style="color:var(--green-600)">'+logs.filter(function(l){return l.action==='PUNCH_OUT';}).length+'</div><div class="label">Punch Outs</div></div>'+
        '<div class="stat-card"><div class="value" style="color:var(--blue-600)">'+logs.filter(function(l){return l.action==='UPDATE'||l.action==='APPROVE';}).length+'</div><div class="label">Edits / Approvals</div></div>'+

        '<table><thead><tr>'+
          '<th>Timestamp</th><th>Action</th><th>Entry</th><th>Changed By</th><th>Reason</th><th>Field Changed</th><th style="background:#fef2f2;color:#991b1b">Before</th><th style="background:#f0fdf4;color:#065f46">After</th>'+
        '</tr></thead><tbody>'+tableRows+'</tbody></table>'+
      '</div>';
  });
}

window.downloadAuditCSV=function(){
  var logs=window._auditLogs||[];
  if(logs.length===0){showToast('No audit entries to export',true);return;}
  var csv=buildAuditCSV(logs);
  var blob=new Blob([csv],{type:'text/csv'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download='SOX_Audit_Trail_'+new Date().toISOString().split('T')[0]+'.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Audit trail exported to CSV');
};

        '<div class="stat-card"><div class="value" style="color:var(--red-500)">'+totalDT.toFixed(1)+'</div><div class="label">Double Time</div></div>'+
        '<div class="stat-card"><div class="value" style="color:var(--green-600)">'+(totalReg+totalOT+totalDT).toFixed(1)+'</div><div class="label">Total Hours</div></div>'+
      '</div>'+
      '<div class="card" style="padding:0;overflow:auto">'+
        '<table><thead><tr><th>Date</th><th>Clock In</th><th>Clock Out</th><th>Cost Code</th><th>Reg</th><th>OT</th><th>DT</th><th>Per Diem</th><th>Status</th></tr></thead><tbody>'+
        (myEntries.length===0?'<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--gray-500)">No time entries found</td></tr>':
          myEntries.map(function(e){
            var total=Number(e.hours_regular)+Number(e.hours_overtime)+Number(e.hours_double);
            return '<tr>'+
              '<td>'+new Date(e.work_date).toLocaleDateString()+'</td>'+
              '<td style="font-family:monospace;font-size:12px">'+(e.clock_in?fmtTime(e.clock_in):'—')+'</td>'+
              '<td style="font-family:monospace;font-size:12px">'+(e.clock_out?fmtTime(e.clock_out):(e.status==='clocked_in'?'<span class="pulse" style="color:var(--green-600);font-weight:700">ON CLOCK</span>':'—'))+'</td>'+
              '<td>'+(e.cost_code_value?'<span style="font-family:monospace">'+e.cost_code_value+'</span>':'<span style="color:var(--amber-500);font-size:12px">Unassigned</span>')+'</td>'+
              '<td>'+(total>0?Number(e.hours_regular).toFixed(1):'—')+'</td>'+
              '<td>'+(Number(e.hours_overtime)>0?'<strong style="color:var(--amber-500)">'+Number(e.hours_overtime).toFixed(1)+'</strong>':'—')+'</td>'+
              '<td>'+(Number(e.hours_double)>0?'<strong style="color:var(--red-500)">'+Number(e.hours_double).toFixed(1)+'</strong>':'—')+'</td>'+
              '<td>'+(Number(e.per_diem)>0?'$'+Number(e.per_diem).toFixed(0):'—')+'</td>'+
              '<td><span class="badge '+sb(e.status)+'">'+e.status.replace('_',' ')+'</span></td>'+
            '</tr>';
          }).join(''))+
        '</tbody></table></div>';
  });
}

function renderTimeOff(el){
  var empId=currentEmployeeId;
  if(!empId){el.innerHTML='<div class="card" style="text-align:center;padding:48px">Select an employee from the sidebar.</div>';return;}
  var emp=getEmpById(empId);
  var types=[{v:'vacation',l:'Vacation'},{v:'sick',l:'Sick Leave'},{v:'pto',l:'Personal/PTO'},{v:'bereavement',l:'Bereavement'},{v:'jury_duty',l:'Jury Duty'},{v:'comp',l:'Comp Time'}];

  api('/api/time-off-requests?employee_id='+empId).then(function(requests){
    var sb=function(s){return s==='approved'?'badge-approved':s==='denied'?'badge-flagged':'badge-pending';};
    el.innerHTML=
      '<div class="page-header"><div><h1>Request Time Off</h1><div class="subtitle">'+(emp?emp.first_name+' '+emp.last_name:'')+'</div></div></div>'+
      '<div class="card"><h2>New Request</h2>'+
        '<div class="form-row">'+
          '<div class="form-group"><label>Type *</label><select id="to-type">'+types.map(function(t){return '<option value="'+t.v+'">'+t.l+'</option>';}).join('')+'</select></div>'+
          '<div class="form-group"><label>Total Hours</label><input type="number" id="to-hours" value="8" min="1" max="80" step="1"/></div>'+
        '</div>'+
        '<div class="form-row">'+
          '<div class="form-group"><label>Start Date *</label><input type="date" id="to-start"/></div>'+
          '<div class="form-group"><label>End Date *</label><input type="date" id="to-end"/></div>'+
        '</div>'+
        '<div class="form-group"><label>Notes</label><textarea id="to-notes" rows="2" placeholder="Reason for request..."></textarea></div>'+
        '<div style="display:flex;justify-content:flex-end"><button class="btn btn-primary" onclick="submitTimeOff()">Submit Request</button></div>'+
      '</div>'+
      '<div class="card"><h2>My Requests</h2>'+
        (requests.length===0?'<div style="text-align:center;padding:32px;color:var(--gray-500)">No time off requests yet.</div>':
          '<table><thead><tr><th>Type</th><th>Dates</th><th>Hours</th><th>Status</th><th>Notes</th><th>Submitted</th></tr></thead><tbody>'+
          requests.map(function(r){
            var tc=TO_TYPE_COLORS[r.type]||['#eee','#333'];
            return '<tr>'+
              '<td><span class="time-off-type" style="background:'+tc[0]+';color:'+tc[1]+'">'+(TO_TYPE_LABELS[r.type]||r.type)+'</span></td>'+
              '<td>'+new Date(r.start_date).toLocaleDateString()+' — '+new Date(r.end_date).toLocaleDateString()+'</td>'+
              '<td>'+r.total_hours+'h</td>'+
              '<td><span class="badge '+sb(r.status)+'">'+r.status+'</span></td>'+
              '<td style="max-width:200px;font-size:12px;color:var(--gray-500)">'+(r.notes||'—')+'</td>'+
              '<td style="font-size:12px">'+new Date(r.requested_at).toLocaleDateString()+'</td>'+
            '</tr>';
          }).join('')+
          '</tbody></table>')+
      '</div>';
  });
}

window.submitTimeOff=function(){
  var startVal=document.getElementById('to-start').value;
  var endVal=document.getElementById('to-end').value;
  if(!startVal||!endVal){showToast('Start and end dates are required',true);return;}
  var body={
    employee_id:currentEmployeeId,
    type:document.getElementById('to-type').value,
    start_date:startVal,end_date:endVal,
    total_hours:parseInt(document.getElementById('to-hours').value)||8,
    notes:document.getElementById('to-notes').value||null
  };
  api('/api/time-off-requests',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(function(result){
    if(result.error){showToast('Error: '+result.error,true);return;}
    showToast('Time off request submitted');
    renderTimeOff(document.getElementById('main-content'));
  });
};

function renderManageTimeOff(el){
  Promise.all([api('/api/time-off-requests'),api('/api/employees')]).then(function(results){
    var requests=results[0],emps=results[1];
    var pendingReqs=requests.filter(function(r){return r.status==='pending';});
    var otherReqs=requests.filter(function(r){return r.status!=='pending';});
    var types=[{v:'vacation',l:'Vacation'},{v:'sick',l:'Sick Leave'},{v:'pto',l:'Personal/PTO'},{v:'bereavement',l:'Bereavement'},{v:'jury_duty',l:'Jury Duty'},{v:'holiday',l:'Holiday'},{v:'comp',l:'Comp Time'}];
    var sb=function(s){return s==='approved'?'badge-approved':s==='denied'?'badge-flagged':'badge-pending';};

    el.innerHTML=
      '<div class="page-header"><div><h1>Manage Time Off</h1><div class="subtitle">Review requests, add vacation, sick, and holiday time for employees.</div></div></div>'+
      (pendingReqs.length>0?
        '<div class="card" style="border-left:4px solid var(--amber-500)"><h2 style="color:var(--amber-500)">Pending Requests ('+pendingReqs.length+')</h2>'+
          pendingReqs.map(function(r){
            var tc=TO_TYPE_COLORS[r.type]||['#eee','#333'];
            return '<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--gray-100)">'+
              '<div>'+
                '<strong>'+(r.first_name||'')+' '+(r.last_name||'')+'</strong>'+
                ' <span class="time-off-type" style="margin-left:8px;background:'+tc[0]+';color:'+tc[1]+'">'+(TO_TYPE_LABELS[r.type]||r.type)+'</span>'+
                '<div style="font-size:13px;color:var(--gray-500);margin-top:2px">'+new Date(r.start_date).toLocaleDateString()+' — '+new Date(r.end_date).toLocaleDateString()+' &middot; '+r.total_hours+'h'+(r.notes?' &middot; '+r.notes:'')+'</div>'+
              '</div>'+
              '<div style="display:flex;gap:8px">'+
                '<button class="btn btn-success btn-sm" onclick="reviewTimeOff('+r.id+',\'approved\')">Approve</button>'+
                '<button class="btn btn-danger btn-sm" onclick="reviewTimeOff('+r.id+',\'denied\')">Deny</button>'+
              '</div>'+
            '</div>';
          }).join('')+
        '</div>':
        '<div class="card" style="text-align:center;padding:32px;color:var(--green-600);border-left:4px solid var(--green-600)"><strong>No pending requests</strong> — All time off requests have been reviewed.</div>'
      )+
      '<div class="card"><h2>Add Time Off for Employee</h2>'+
        '<div class="form-row">'+
          '<div class="form-group"><label>Employee *</label><select id="ato-emp">'+emps.filter(function(e){return e.role!=='admin';}).map(function(e){return '<option value="'+e.id+'">'+e.last_name+', '+e.first_name+' ('+e.employee_number+')</option>';}).join('')+'</select></div>'+
          '<div class="form-group"><label>Type *</label><select id="ato-type">'+types.map(function(t){return '<option value="'+t.v+'">'+t.l+'</option>';}).join('')+'</select></div>'+
        '</div>'+
        '<div class="form-row">'+
          '<div class="form-group"><label>Start Date *</label><input type="date" id="ato-start"/></div>'+
          '<div class="form-group"><label>End Date *</label><input type="date" id="ato-end"/></div>'+
        '</div>'+
        '<div class="form-row">'+
          '<div class="form-group"><label>Hours</label><input type="number" id="ato-hours" value="8" min="1" max="80" step="1"/></div>'+
          '<div class="form-group"><label>Notes</label><input id="ato-notes" placeholder="e.g. Company holiday, approved by HR..."/></div>'+
        '</div>'+
        '<div style="display:flex;justify-content:flex-end"><button class="btn btn-primary" onclick="addTimeOffAdmin()">Add Time Off</button></div>'+
      '</div>'+
      (otherReqs.length>0?
        '<div class="card"><h2>All Reviewed Requests</h2>'+
          '<table><thead><tr><th>Employee</th><th>Type</th><th>Dates</th><th>Hours</th><th>Status</th><th>Notes</th><th>Reviewed</th></tr></thead><tbody>'+
          otherReqs.map(function(r){
            var tc=TO_TYPE_COLORS[r.type]||['#eee','#333'];
            return '<tr>'+
              '<td style="font-weight:600">'+(r.first_name||'')+' '+(r.last_name||'')+'</td>'+
              '<td><span class="time-off-type" style="background:'+tc[0]+';color:'+tc[1]+'">'+(TO_TYPE_LABELS[r.type]||r.type)+'</span></td>'+
              '<td>'+new Date(r.start_date).toLocaleDateString()+' — '+new Date(r.end_date).toLocaleDateString()+'</td>'+
              '<td>'+r.total_hours+'h</td>'+
              '<td><span class="badge '+sb(r.status)+'">'+r.status+'</span></td>'+
              '<td style="max-width:200px;font-size:12px;color:var(--gray-500)">'+(r.notes||'—')+'</td>'+
              '<td style="font-size:12px">'+(r.reviewed_at?new Date(r.reviewed_at).toLocaleDateString():'—')+'</td>'+
            '</tr>';
          }).join('')+
          '</tbody></table></div>':''
      );
  });
}

window.reviewTimeOff=function(id,status){
  api('/api/time-off-requests/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:status,reviewed_by:15})}).then(function(result){
    if(result.error){showToast('Error: '+result.error,true);return;}
    showToast('Request '+status);
    renderManageTimeOff(document.getElementById('main-content'));
  });
};

window.addTimeOffAdmin=function(){
  var startVal=document.getElementById('ato-start').value;
  var endVal=document.getElementById('ato-end').value;
  if(!startVal||!endVal){showToast('Start and end dates are required',true);return;}
  var body={
    employee_id:parseInt(document.getElementById('ato-emp').value),
    type:document.getElementById('ato-type').value,
    start_date:startVal,end_date:endVal,
    total_hours:parseInt(document.getElementById('ato-hours').value)||8,
    notes:document.getElementById('ato-notes').value||null,
    status:'approved',reviewed_by:15
  };
  api('/api/time-off-requests',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(function(result){
    if(result.error){showToast('Error: '+result.error,true);return;}
    showToast('Time off added for employee');
    renderManageTimeOff(document.getElementById('main-content'));
  });
};

// Init: load employees then render
api('/api/employees').then(function(emps){
  cachedEmployees=emps;
  currentEmployeeId=15;
  renderSidebarNav();
  showPage('dashboard');
});
</script>
</body>
